<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Sellory</title>
  <meta name="description" content="Dashboard Sellory - Kelola toko online Anda." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../style.css" />
  <style>
    /* Dashboard Styles */
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 24px 40px;
      min-height: 100vh;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 24px;
    }

    .dashboard-title {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 600;
      color: #2D2D2D;
    }

    .dashboard-nav {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #F5F0E8;
      border-radius: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C9A96E 0%, #8B6914 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      font-weight: 600;
      font-size: 16px;
    }

    .user-details {
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #2D2D2D;
    }

    .user-email {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      color: #6B6B6B;
    }

    .logout-btn {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      background: #FFFFFF;
      border: 1.5px solid #EDE7D9;
      border-radius: 8px;
      color: #C9846E;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      border-color: #C9846E;
      background: #F5EDD9;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .dashboard-card {
      background: #FFFFFF;
      border: 1px solid #EDE7D9;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }

    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: #F5EDD9;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: #2D2D2D;
      margin-bottom: 8px;
    }

    .card-description {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      color: #6B6B6B;
      line-height: 1.6;
    }

    .dashboard-section {
      margin-bottom: 48px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 600;
      color: #2D2D2D;
      margin-bottom: 24px;
    }

    .loading {
      text-align: center;
      padding: 48px 24px;
      color: #6B6B6B;
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(201, 169, 110, 0.3);
      border-top-color: #C9A96E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .dashboard-title {
        font-size: 28px;
      }

      .dashboard-nav {
        width: 100%;
        flex-wrap: wrap;
      }

      .user-info {
        flex: 1 1 auto;
        min-width: 200px;
      }

      .logout-btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <h1 class="dashboard-title">Dashboard</h1>
      <div class="dashboard-nav">
        <div class="user-info" id="userInfo">
          <div class="user-avatar" id="userAvatar">A</div>
          <div class="user-details">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-email" id="userEmail">—</div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <!-- Welcome Section -->
    <div class="dashboard-section" id="welcomeSection">
      <div class="loading">
        <div class="spinner"></div>
        <p>Memuat dashboard Anda...</p>
      </div>
    </div>

    <!-- Features Grid -->
    <div class="dashboard-section" id="featuresSection" style="display: none;">
      <h2 class="section-title">Mulai Jual</h2>
      <div class="dashboard-grid">
        <div class="dashboard-card">
          <div class="card-icon">📦</div>
          <h3 class="card-title">Produk</h3>
          <p class="card-description">Kelola inventory produk Anda dengan mudah</p>
        </div>
        <div class="dashboard-card">
          <div class="card-icon">🛒</div>
          <h3 class="card-title">Pesanan</h3>
          <p class="card-description">Lihat dan kelola pesanan dari pelanggan</p>
        </div>
        <div class="dashboard-card">
          <div class="card-icon">🎨</div>
          <h3 class="card-title">Desain Toko</h3>
          <p class="card-description">Pilih tema dan sesuaikan tampilan toko</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth Module -->
  <script src="../../assets/js/auth.js"></script>

  <!-- Dashboard Script -->
  <script>
    // Require authentication
    AUTH.requireAuth();

    const userNameEl = document.getElementById('userName');
    const userEmailEl = document.getElementById('userEmail');
    const userAvatarEl = document.getElementById('userAvatar');
    const welcomeSection = document.getElementById('welcomeSection');
    const featuresSection = document.getElementById('featuresSection');
    const logoutBtn = document.getElementById('logoutBtn');

    // Load user data
    async function loadDashboard() {
      try {
        const user = await AUTH.getCurrentUser();

        if (user) {
          // Update user info
          userNameEl.textContent = user.full_name || 'User';
          userEmailEl.textContent = user.email || '—';

          // Update avatar with initials
          const initials = user.full_name
            .split(' ')
            .map(n => n[0])
            .join('')
            .toUpperCase()
            .substring(0, 2);
          userAvatarEl.textContent = initials;

          // Hide loading, show features
          welcomeSection.innerHTML = `
            <div style="text-align: center;">
              <h2 class="section-title">Selamat datang, ${user.full_name}! 👋</h2>
              <p style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; color: #6B6B6B; margin-bottom: 24px;">
                Toko Anda siap diluncurkan. Mulai tambahkan produk dan kelola pesanan Anda.
              </p>
            </div>
          `;
          featuresSection.style.display = 'block';
        } else {
          // Redirect to login if not authenticated
          AUTH.logout();
        }
      } catch (error) {
        console.error('Error loading dashboard:', error);
        AUTH.logout();
      }
    }

    // Logout handler
    logoutBtn.addEventListener('click', () => {
      if (confirm('Yakin ingin logout?')) {
        AUTH.logout();
      }
    });

    // Load dashboard on page load
    loadDashboard();
  </script>
</body>
</html>
